name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    # Unit tests are fully mocked — no domain required — so Linux is sufficient and faster.
    # Integration tests (Tests/Integration/) require a Windows runner with domain access
    # and are not run here.
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        shell: pwsh
        run: |
          Set-PSResourceRepository -Name PSGallery -Trusted
          Install-PSResource InvokeBuild -Scope CurrentUser -Quiet
          Install-PSResource Pester      -Scope CurrentUser -Quiet
          Install-PSResource PSScriptAnalyzer -Scope CurrentUser -Quiet

      - name: Lint
        shell: pwsh
        run: Invoke-Build Lint

      - name: Test
        shell: pwsh
        run: Invoke-Build Test

      - name: Build
        shell: pwsh
        run: Invoke-Build Build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: DirectoryServicesToolkit-${{ github.sha }}
          path: ./Output/
          if-no-files-found: error
