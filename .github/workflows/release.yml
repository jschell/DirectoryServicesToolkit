name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # required to create the GitHub Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        shell: pwsh
        run: |
          Set-PSResourceRepository -Name PSGallery -Trusted
          Install-PSResource InvokeBuild       -Scope CurrentUser -Quiet
          Install-PSResource Pester            -Scope CurrentUser -Quiet
          Install-PSResource PSScriptAnalyzer  -Scope CurrentUser -Quiet

      - name: Full CI pipeline
        shell: pwsh
        run: Invoke-Build CI

      - name: Determine version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create release archive
        shell: pwsh
        run: |
          Compress-Archive -Path ./Output/* `
                           -DestinationPath "./DirectoryServicesToolkit-${{ steps.version.outputs.version }}.zip"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: DirectoryServicesToolkit v${{ steps.version.outputs.version }}
          files: DirectoryServicesToolkit-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
